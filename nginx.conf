# nginx 配置 - NBA Web 应用（SPA 模式）
# 部署目录：/path/to/apps/web/.output/public

server {
    listen 80;
    server_name nba.example.com;

    # 部署目录
    root /var/www/nba/.output/public;
    index index.html;

    # 访问日志
    access_log /var/log/nginx/nba-access.log;
    error_log /var/log/nginx/nba-error.log;

    # 字符集
    charset utf-8;

    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # SPA 路由：所有请求都返回 index.html，由前端路由处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 禁用隐藏文件访问
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

