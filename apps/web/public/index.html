<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NBA - 下一代业务应用</title>
    <meta name="description" content="基于 AI 的企业级业务平台，集成 CRM、ERP 等核心业务系统">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }

      body {
        background-color: #f9fafb;
        color: #111827;
      }

      html.dark body {
        background-color: #111827;
        color: #f3f4f6;
      }

      #nuxt-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .loading-content {
        text-align: center;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #3b82f6;
        border-top: 4px solid #60a5fa;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="nuxt-loading">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
      </div>
    </div>

    <script>
      // 检测暗色模式
      function initTheme() {
        const darkMode = localStorage.getItem('nuxt-color-mode') || 'light';
        if (darkMode === 'dark') {
          document.documentElement.classList.add('dark');
        }
      }

      // 动态加载脚本
      const script = document.createElement('script');
      // 注意：构建后实际的入口文件名可能不同
      // 这里的入口文件名会在构建后更新
      script.src = '/_nuxt/96OZjhjk.js';
      script.defer = true;
      script.crossOrigin = 'anonymous';
      script.onload = () => {
        // 移除加载动画
        const loading = document.getElementById('nuxt-loading');
        if (loading) {
          loading.style.display = 'none';
        }
      };
      script.onerror = () => {
        console.error('Failed to load app');
        const loading = document.getElementById('nuxt-loading');
        if (loading) {
          loading.innerHTML = '<p style="color: red;">加载失败，请刷新页面</p>';
        }
      };
      document.head.appendChild(script);

      initTheme();
    </script>
  </body>
</html>
